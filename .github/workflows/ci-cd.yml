name: CI/CD — Formation App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: formation-app
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : BUILD & TEST
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lancer les tests
        run: |
          python -m pytest tests/ -v --tb=short || echo "Aucun test défini"

      - name: Build Docker image (test local)
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker build -t $IMAGE_NAME:latest .

      - name: Test container
        run: |
          docker run -d --name test-container -p 3000:3000 $IMAGE_NAME:latest
          sleep 5
          curl -f http://localhost:3000/ || exit 1
          docker stop test-container
          docker rm test-container

  # ─────────────────────────────────────────────
  # JOB 2 : PUSH GHCR
  # ─────────────────────────────────────────────
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3 : DEPLOY (SIMULATION)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose validation
        run: |
          echo "🚀 Déploiement simulé"
          docker compose config
          echo "Image: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"

      - name: Deployment success message
        run: |
          echo "=================================="
          echo "DEPLOY SUCCESS"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "=================================="