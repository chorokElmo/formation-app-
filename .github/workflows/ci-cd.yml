name: CI/CD — Formation App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: formation-app
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : BUILD & TEST
  # ─────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short || echo "No tests found"

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .
          docker build -t $IMAGE_NAME:latest .

      - name: Test container
        run: |
          docker run -d --name app-test -p 3000:3000 $IMAGE_NAME:latest
          sleep 5
          curl -f http://localhost:3000/ || exit 1
          docker stop app-test
          docker rm app-test

  # ─────────────────────────────────────────────
  # JOB 2 : PUSH GHCR
  # ─────────────────────────────────────────────
  push-image:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/formation-app:latest
            ghcr.io/${{ github.repository_owner }}/formation-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 3 : DEPLOY (SIMULATION)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          echo "🚀 Deployment starting..."
          docker compose config || echo "No docker-compose.yml found"

      - name: Deployment info
        run: |
          echo "===================================="
          echo " DEPLOYMENT SUCCESS (SIMULATION)"
          echo "===================================="
          echo "Image: ghcr.io/${{ github.repository_owner }}/formation-app:latest"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Date: $(date)"
          echo "===================================="